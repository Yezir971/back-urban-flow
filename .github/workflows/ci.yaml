name: NestJS Security CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------
  # JOB 1 — OWASP zap : analyse faille de sécurité
  # -----------------------------------------------
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 1. installation
        run: npm ci

      - name: 2. run test
        run: npm run test

      - name: 3. build
        run: npm run build
  # -----------------------------------------------
  # JOB 2 — OWASP zap : analyse faille de sécurité
  # -----------------------------------------------
  owasp-zap:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: 1. Récupérer le code
        uses: actions/checkout@v4

      - name: 2. Configuration Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 3. installation et build
        run: |
          npm ci
          npm run build

      - name: 4. Démarrage de l'API pour le scan
        run: |
          npm run start:prod &
          npx wait-on http://localhost:3000/api # Attend que Swagger soit prêt
        env:
          # DATABASE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          PORT: 3000
      - name: 5. Préparer les permissions pour ZAP
        run: chmod -R 777 .

      - name: 6. Scan OWASP ZAP (Baseline)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000/api'
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_action: false
          issue_title: 'Alerte Sécurité ZAP détectée'
          rules_file_name: '.github/rules/zap-rules.tsv'
          artifact_name: 'zap-report'

  # -----------------------------------------------
  # JOB 3 — Snyk : vulnérabilités des dépendances
  # -----------------------------------------------
  snyk:
    name: Snyk – Dépendances npm
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Authentification Snyk
        uses: snyk/actions/setup@master

      - name: Snyk – Test des dépendances
        run: snyk test --severity-threshold=high --json > snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload rapport Snyk
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json

      - name: Snyk – Bloquer si critique ou élevé
        run: snyk test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
